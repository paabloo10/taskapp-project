<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: {
                        '3xl': '1920px',
                        '4xl': '2560px'
                    },
                    colors: {
                        primary: "#6366f1",
                        high: "#ef4444",
                        medium: "#f59e0b",
                        low: "#10b981"
                    },
                    spacing: {
                        sm: "8px",
                        md: "16px",
                        lg: "24px"
                    },
                    fontFamily: {
                        main: ["Segoe UI", "sans-serif"]
                    }
                }
            }
        }
    </script>

    <title>Task Manager</title>
</head>

<body class="min-h-screen font-main text-gray-900 dark:text-gray-100 selection:bg-primary/30 selection:text-gray-900 dark:selection:text-gray-100">
    <!-- Fondo con degradado + “blur blobs” -->
    <div class="fixed inset-0 -z-10 overflow-hidden bg-gradient-to-br from-indigo-50 via-white to-fuchsia-50 dark:from-gray-950 dark:via-gray-950 dark:to-gray-900">
        <div class="absolute -top-28 -left-28 h-80 w-80 rounded-full bg-gradient-to-br from-primary/30 to-fuchsia-400/20 blur-3xl"></div>
        <div class="absolute top-20 -right-24 h-96 w-96 rounded-full bg-gradient-to-br from-emerald-400/20 to-sky-400/20 blur-3xl"></div>
        <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-gradient-to-br from-amber-400/20 to-rose-400/20 blur-3xl"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_1px_1px,rgba(0,0,0,0.06)_1px,transparent_0)] [background-size:22px_22px] dark:bg-[radial-gradient(circle_at_1px_1px,rgba(255,255,255,0.06)_1px,transparent_0)]"></div>
    </div>

    <!-- HEADER -->
    <header
        class="sticky top-0 z-10 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 px-4 sm:px-6 md:px-10 2xl:px-16 3xl:px-24 py-4 sm:py-5 border-b border-black/5 dark:border-white/10 bg-white/70 dark:bg-gray-950/60 backdrop-blur">

        <h1 class="text-xl sm:text-2xl 2xl:text-3xl font-bold tracking-tight">
            Task<span class="text-primary">Flow</span>
        </h1>

        <button id="toggleDark"
            class="w-full sm:w-auto rounded-xl px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:shadow-md active:scale-[0.99] bg-gradient-to-r from-primary to-fuchsia-500">
            Modo oscuro
        </button>

    </header>


    <!-- LAYOUT -->
    <main
        class="mx-auto flex w-full max-w-7xl 2xl:max-w-[96rem] 3xl:max-w-[110rem] 4xl:max-w-[128rem] flex-1 md:flex-row flex-col gap-6 2xl:gap-8 px-4 sm:px-6 md:px-10 2xl:px-16 3xl:px-24 py-6 sm:py-8 2xl:py-10">

        <!-- SIDEBAR -->
        <aside
            class="text-white w-full md:w-[240px] 2xl:w-[280px] 3xl:w-[320px] p-4 sm:p-6 2xl:p-7 md:block flex justify-center rounded-2xl border border-white/10 bg-gradient-to-b from-gray-900/90 to-gray-950/90 backdrop-blur shadow-lg shadow-black/10">

            <ul class="flex md:flex-col gap-2 w-full flex-wrap" id="categorySidebar">
                <li data-category="all"
                    class="cursor-pointer rounded-xl px-3 py-2 hover:bg-white/10 transition bg-white/10">
                    Todas
                </li>
                <li data-category="work" class="cursor-pointer rounded-xl px-3 py-2 hover:bg-white/10 transition">
                    Trabajo
                </li>
                <li data-category="personal" class="cursor-pointer rounded-xl px-3 py-2 hover:bg-white/10 transition">
                    Personal
                </li>
            </ul>

        </aside>


        <!-- TASK SECTION -->
        <section
            class="flex-1 rounded-2xl border border-black/5 dark:border-white/10 bg-white/70 dark:bg-gray-950/60 backdrop-blur p-4 sm:p-6 md:p-10 2xl:p-12 3xl:p-14 shadow-lg shadow-black/5">

            <div class="flex items-end justify-between gap-4 mb-6">
                <div>
                    <h2 class="text-2xl 2xl:text-3xl 3xl:text-4xl font-semibold tracking-tight">Lista de tareas</h2>
                    <p class="text-sm 2xl:text-base text-gray-600 dark:text-gray-300">Organiza tu día con prioridades y foco.</p>
                </div>
            </div>

            <!-- FORM -->
            <form id="taskForm" class="flex flex-col md:flex-row gap-3 mb-6">

                <input id="taskInput" type="text" placeholder="Nueva tarea..."
                    class="w-full flex-1 p-3 rounded-xl border border-black/10 dark:border-white/10 bg-white/80 dark:bg-gray-900/50 outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition" />

                <select id="category"
                    class="w-full md:w-44 p-3 rounded-xl border border-black/10 dark:border-white/10 bg-white/80 dark:bg-gray-900/50 outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition">
                    <option value="personal">Personal</option>
                    <option value="work">Trabajo</option>
                </select>

                <select id="priority"
                    class="w-full md:w-44 p-3 rounded-xl border border-black/10 dark:border-white/10 bg-white/80 dark:bg-gray-900/50 outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>

                <button
                    class="w-full md:w-auto rounded-xl px-5 py-3 text-white font-semibold shadow-sm transition hover:shadow-md active:scale-[0.99] bg-gradient-to-r from-primary to-sky-500">
                    Añadir
                </button>

            </form>

            <!-- SEARCH + FILTERS -->
            <div class="flex flex-col md:flex-row gap-3 mb-6">
                <input id="searchInput" type="text" placeholder="Buscar tareas..."
                    class="w-full flex-1 p-3 rounded-xl border border-black/10 dark:border-white/10 bg-white/80 dark:bg-gray-900/50 outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition" />

                <button id="toggleCompletedView" type="button"
                    class="w-full md:w-auto rounded-xl px-4 py-3 text-sm font-semibold border border-black/10 dark:border-white/10 bg-white/80 dark:bg-gray-900/50 hover:bg-white dark:hover:bg-gray-900/70 transition">
                    Completadas
                </button>

                <select id="filterCategory"
                    class="w-full md:w-44 p-3 rounded-xl border border-black/10 dark:border-white/10 bg-white/80 dark:bg-gray-900/50 outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition">
                    <option value="all">Todas</option>
                    <option value="work">Trabajo</option>
                    <option value="personal">Personal</option>
                </select>

                <select id="filterPriority"
                    class="w-full md:w-44 p-3 rounded-xl border border-black/10 dark:border-white/10 bg-white/80 dark:bg-gray-900/50 outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition">
                    <option value="all">Todas</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <!-- TASK LIST -->
            <div id="taskList" class="flex flex-col gap-4">

            </div>

        </section>

    </main>

    <footer class="mx-auto w-full max-w-7xl 2xl:max-w-[96rem] 3xl:max-w-[110rem] 4xl:max-w-[128rem] px-4 sm:px-6 md:px-10 2xl:px-16 3xl:px-24 pb-8 2xl:pb-10">
        <div
            class="mt-6 rounded-2xl border border-black/10 dark:border-white/10 bg-white/70 dark:bg-gray-950/40 backdrop-blur p-4 2xl:p-6 flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
            <div class="text-sm 2xl:text-base">
                <div class="font-semibold 2xl:text-lg">Pablo Rodriguez</div>
                <div class="text-gray-600 dark:text-gray-400">Contacto</div>
            </div>

            <div class="flex flex-col gap-1 text-sm 2xl:text-base md:items-end">
                <a class="text-primary hover:underline break-all" href="mailto:pablorodriguezrustom@gmail.com">pablorodriguezrustom@gmail.com</a>
                <a class="text-primary hover:underline" href="tel:+34 621 097 180">+34 621 097 180</a>
                <a class="text-primary hover:underline" href="https://github.com/paabloo10" target="_blank"
                    rel="noreferrer">github.com/paabloo10</a>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>

</body>

</html>
